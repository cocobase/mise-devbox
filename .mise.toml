[env]
_.file = ".env"
TOOLCHAIN_IMAGE = "ai-dev-toolchain:latest"
REDIS_URL = "redis://agent-redis:6379/0"
QDRANT_HOST = "agent-qdrant"
QDRANT_PORT = "6333"

[tools]
python = "3.12.13"
node = "22.22.3"
pnpm = "11.2.2"
uv = "0.11.16"

[tasks.setup]
description = "Install tools and prepare development environment"
run = "mise install && uv venv && pnpm install"

[tasks.up]
description = "Start the full AI-Agent harness: check host, start infra, build image if needed, and enter container shell"
run = "scripts/task-harness-up"

[tasks.down]
description = "Stop infrastructure and remove all toolchain containers (preserves data volumes and network)"
run = "scripts/task-harness-down"

[tasks.clean]
description = "Deep clean: remove volumes, network, and toolchain image"
run = "scripts/task-harness-clean"

[tasks.logs]
description = "Tail logs from infrastructure services (Redis, Qdrant)"
run = "scripts/compose logs -f"

[tasks.agent-logs]
description = "Tail agent logs from the mounted workspace"
run = "tail -f logs/agent.log 2>/dev/null || echo 'No logs/agent.log found. Logs are written inside the container to /workspace/logs/agent.log'"

[tasks.build]
description = "Build the Docker image that contains mise, python, node, pnpm, uv, git, and gh"
run = "docker build -t ${TOOLCHAIN_IMAGE} -f docker/Dockerfile ."

[tasks.check]
description = "Check whether mise, Docker, docker-compose, and optional Homebrew are installed and Docker daemon is running"
run = "scripts/check-host"

[tasks.shell]
description = "Open an interactive shell inside the toolchain container. Optional arg: project directory"
run = "scripts/toolchain shell"

[tasks.run]
description = "Run a command inside the toolchain container. Usage: mise run run -- <project_dir> <command...>"
run = "scripts/toolchain run"

[tasks.versions]
description = "Print tool versions from inside the toolchain container"
run = "scripts/toolchain versions ."



