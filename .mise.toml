[env]
TOOLCHAIN_IMAGE = "ai-dev-toolchain:latest"

[tools]
python = "3.12"
node = "22"
pnpm = "latest"
uv = "latest"

[tasks.build]
description = "Build the Docker image that contains mise, python, node, pnpm, uv, and git"
depends = ["check"]
run = "docker build -t ${TOOLCHAIN_IMAGE} -f docker/Dockerfile ."

[tasks.check]
description = "Check whether mise and Docker are installed and Docker Desktop is running"
run = "scripts/check-host"

[tasks.shell]
description = "Open an interactive shell inside the toolchain container. Optional arg: project directory"
depends = ["check"]
run = "scripts/toolchain shell"

[tasks.run]
description = "Run a command inside the toolchain container. Usage: mise run run -- <project_dir> <command...>"
depends = ["check"]
run = "scripts/toolchain run"

[tasks.versions]
description = "Print tool versions from inside the toolchain container"
depends = ["check"]
run = "scripts/toolchain versions ."

[tasks.clean]
description = "Remove the local toolchain Docker image"
run = "docker image rm ${TOOLCHAIN_IMAGE}"
